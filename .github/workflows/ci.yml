name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          # Skip GPU-only packages that won't install on CI
          python - <<'PY' > /tmp/ci-requirements.txt
          from pathlib import Path
          skip = {"vllm", "bitsandbytes", "accelerate"}
          for raw in Path("requirements.txt").read_text(encoding="utf-8").splitlines():
              line = raw.split("#", 1)[0].strip()
              if not line:
                  continue
              name = line.replace(" ", "").split(">=", 1)[0].split("==", 1)[0].split("<=", 1)[0].split("[", 1)[0]
              if name.lower() in skip:
                  continue
              print(line)
          PY
          python -m pip install -r /tmp/ci-requirements.txt

      - name: Syntax check core modules
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            api/main.py \
            api/dependencies.py \
            api/schemas.py \
            api/services/command_service.py \
            api/services/text_formatting.py \
            api/routers/chat.py \
            api/routers/context.py \
            api/routers/finetune.py \
            api/routers/memory.py \
            api/routers/runtime.py \
            api/routers/system.py \
            api/routers/training.py \
            brain/models_manager.py \
            brain/response_parser.py \
            brain/ollama_brain.py \
            brain/vllm_brain.py \
            brain/steering_backend.py \
            brain/steering_api_server.py \
            brain/whatsapp_finetune_trainer.py \
            brain/agents/steering_manager.py \
            config/config.py \
            config/prompts.py \
            memory/chat_manager.py \
            memory/short_term_memory.py \
            memory/function_registry.py \
            web_infrastructure/backend_wrapper.py \
            web_infrastructure/ui_utils.py \
            chappie_brain_cli.py

      - name: Run quick tests
        shell: bash
        run: |
          set -eo pipefail
          python tests/test_forgetting_curve.py
          python tests/test_life_simulation.py
          python tests/test_debug_monitor_data.py
          python tests/test_local_first_runtime.py
          python tests/test_config_package_import.py
          python tests/test_chat_ui_formatting.py
          python tests/test_reasoning_layering.py
          python tests/test_web_ui_consistency.py
          python tests/test_root_config.py
          python tests/test_settings_integrity.py
          python tests/test_cli_import.py
          python tests/test_cli_display.py
          python tests/test_cli_commands.py
          python tests/test_cli_remote.py
          python tests/test_finetune_integration.py
          python tests/test_forschung_harness.py

      - name: Run extended tests (may need mock deps)
        shell: bash
        continue-on-error: true
        run: |
          python tests/test_vllm_response_handling.py || true
          python tests/test_ollama_response_handling.py || true
          python tests/test_chat_manager_persistence.py || true
          python tests/test_short_term_memory.py || true
          python tests/test_training_config_ui.py || true
          python tests/test_api_contract.py || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm run build